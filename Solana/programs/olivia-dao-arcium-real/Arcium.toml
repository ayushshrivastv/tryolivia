[localnet]
# Number of nodes in the single cluster of the localnet
nodes = 3
# Number of seconds to wait for the localnet to come online
localnet_timeout_secs = 120
# MPC backends this MXE supports (default: ["Cerberus"])
# Supported values: "Cerberus", "Manticore", or both
# Using Cerberus for OLIVIA DAO encrypted governance
backends = ["Cerberus"]

[devnet]
# Configuration for devnet deployment
# Will be configured when deploying to Arcium devnet

[mainnet]
# Configuration for mainnet deployment
# Will be configured for production launch
